name: sync-upstream
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v2
        with:
          owner: ${{ vars.UPSTREAM_OWNER || 'upstream-owner' }}
          repo:  ${{ vars.UPSTREAM_REPO  || 'upstream-repo'  }}
          base:  ${{ vars.UPSTREAM_BASE  || 'main'          }}
          head:  ${{ vars.UPSTREAM_HEAD  || 'main'          }}
